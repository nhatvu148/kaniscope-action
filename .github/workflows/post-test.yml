# TEMPORARY — verifies the real (posting) path end-to-end. Unlike the dry-run
# self-test, this actually posts a review to the PR. Gated to `posttest*` head
# branches so it can't post on unrelated PRs. Delete this file after verifying.
name: post-test (LIVE — posts a review)

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write     # required to post the review

jobs:
  review:
    if: startsWith(github.head_ref, 'posttest')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Kaniscope review (LIVE)
        uses: ./
        with:
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          model: moonshotai/kimi-k2-0905
          dry-run: 'false'
