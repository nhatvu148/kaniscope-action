# TEMPORARY — regenerates the branded review screenshot by running the PUBLISHED
# @v1 action live (posts a review). Gated to posttest* branches. Delete after.
name: post-test (LIVE — posts a review)

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: startsWith(github.head_ref, 'posttest')
    runs-on: ubuntu-latest
    steps:
      - name: Kaniscope review (published @v1)
        uses: nhatvu148/kaniscope-action@v1
        with:
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          model: moonshotai/kimi-k2-0905
          dry-run: 'false'
